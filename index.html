<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobGen | Professional Application Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .paper { 
            font-family: 'Lora', serif; 
            min-height: 29.7cm; 
            padding: 2.5cm;
            line-height: 1.8;
            color: #1a1a1a;
            border-top: 8px solid #1d4ed8;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .paper { box-shadow: none !important; margin: 0 !important; width: 100% !important; border-top: none; }
            .container { max-width: 100% !important; width: 100% !important; padding: 0 !important; }
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-900 pb-20">

<div class="max-w-7xl mx-auto px-4 py-8">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-8 no-print bg-white p-6 rounded-2xl shadow-sm">
        <div>
            <h1 class="text-3xl font-black text-blue-700">JOBget</h1>
            <p class="text-slate-500">Application Letter Generator</p>
        </div>
        <div class="flex gap-3 mt-4">
            <button onclick="copyToClipboard()" class="bg-slate-200 px-6 py-2 rounded-xl font-bold">Copy</button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Download PDF</button>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">

        <!-- INPUTS -->
        <div class="w-full lg:w-2/5 space-y-6 no-print">

            <div class="bg-white p-6 rounded-2xl">
                <label class="font-bold">Job Category</label>
                <select id="jobSelector" onchange="updatePreview()" class="w-full p-3 mt-2 border rounded-xl">
                    <option value="teacher">Teaching</option>
                    <option value="manager">Manager</option>
                    <option value="developer">Developer</option>
                    <option value="nurse">Nurse</option>
                    <option value="driver">Driver</option>
                    <option value="security">Security</option>
                    <option value="clerk">Clerk</option>
                    <option value="sales">Sales</option>
                </select>
            </div>

            <div class="bg-white p-6 rounded-2xl space-y-3">
                <input id="fullName" placeholder="Full Name" oninput="updatePreview()" class="w-full p-3 border rounded-xl">
                <input id="phone" placeholder="Phone" oninput="updatePreview()" class="w-full p-3 border rounded-xl">
                <input id="education" placeholder="Education" oninput="updatePreview()" class="w-full p-3 border rounded-xl">
                <input id="skills" placeholder="Skills" oninput="updatePreview()" class="w-full p-3 border rounded-xl">
            </div>

            <div class="bg-white p-6 rounded-2xl space-y-3">
                <input id="compName" placeholder="Company Name" oninput="updatePreview()" class="w-full p-3 border rounded-xl">
                <input id="targetJob" placeholder="Job Title" oninput="updatePreview()" class="w-full p-3 border rounded-xl">
            </div>

        </div>

        <!-- OUTPUT -->
        <div class="w-full lg:w-3/5">
            <div class="bg-white shadow-xl paper" id="letterContent"></div>
        </div>

    </div>
</div>

<script>

const templates = {
teacher: d => `Dear Hiring Manager,

I recently came across your opening for a ${d.targetJob} at ${d.compName}, and I felt encouraged to apply.

With a ${d.education}, I have developed strong skills in ${d.skills}. I focus on creating a supportive and engaging learning environment where students can grow academically and personally.

I value clear communication, patience, and adaptability, and I always aim to make lessons meaningful and practical.

I would appreciate the opportunity to contribute to your institution and discuss how I can support your goals.

Sincerely,  
${d.fullName}  
${d.phone}`,

manager: d => `Dear Hiring Manager,

I am writing regarding the ${d.targetJob} position at ${d.compName}.

With a ${d.education} and experience in ${d.skills}, I have developed the ability to lead teams, improve performance, and ensure smooth operations.

I believe in accountability, teamwork, and delivering results while maintaining a positive work environment.

I would welcome the opportunity to contribute to your organization’s success.

Best regards,  
${d.fullName}  
${d.phone}`,

developer: d => `Dear Hiring Manager,

I would like to express my interest in the ${d.targetJob} role at ${d.compName}.

With a ${d.education} and strong experience in ${d.skills}, I enjoy building efficient and scalable solutions.

I focus on clean code, problem-solving, and continuous improvement while working both independently and in teams.

I would appreciate the opportunity to contribute to your technical team.

Sincerely,  
${d.fullName}  
${d.phone}`,

nurse: d => `Dear Hiring Manager,

I am applying for the ${d.targetJob} position at ${d.compName}.

With a ${d.education} and skills in ${d.skills}, I am committed to providing compassionate and professional care to patients.

I value attention to detail, teamwork, and maintaining high standards of care.

Thank you for your consideration.

Sincerely,  
${d.fullName}  
${d.phone}`,

driver: d => `Dear Hiring Manager,

I am applying for the ${d.targetJob} position at ${d.compName}.

With my experience in ${d.skills}, I am reliable, punctual, and focused on safety.

I take pride in responsible driving and timely service delivery.

Respectfully,  
${d.fullName}  
${d.phone}`,

security: d => `Dear Hiring Manager,

I am interested in the ${d.targetJob} role at ${d.compName}.

With training in ${d.skills}, I am committed to maintaining safety and protecting people and property.

I am disciplined, alert, and responsible.

Sincerely,  
${d.fullName}  
${d.phone}`,

clerk: d => `Dear Hiring Manager,

I am applying for the ${d.targetJob} position at ${d.compName}.

With a ${d.education} and skills in ${d.skills}, I am organized and detail-oriented.

I am confident in handling office responsibilities efficiently.

Yours faithfully,  
${d.fullName}  
${d.phone}`,

sales: d => `Dear Hiring Manager,

I am interested in the ${d.targetJob} role at ${d.compName}.

With experience in ${d.skills}, I focus on building customer relationships and achieving targets.

I am motivated, confident, and results-driven.

Best regards,  
${d.fullName}  
${d.phone}`
};

function updatePreview() {
    const category = document.getElementById('jobSelector').value;

    const data = {
        fullName: document.getElementById('fullName').value || "Your Name",
        phone: document.getElementById('phone').value || "Phone",
        education: document.getElementById('education').value || "your qualification",
        skills: document.getElementById('skills').value || "your skills",
        compName: document.getElementById('compName').value || "the company",
        targetJob: document.getElementById('targetJob').value || "the position"
    };

    document.getElementById('letterContent').innerText = templates[category](data);
}

function copyToClipboard() {
    const text = document.getElementById('letterContent').innerText;
    navigator.clipboard.writeText(text);
    alert("Copied successfully!");
}

updatePreview();

</script>

</body>
</html>
